<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BUD — Budget &amp; Daily Spend Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=9">

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ECE0CB">

<!-- iOS home-screen support -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="BUD">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
</head>
<body>

<div class="app" id="app">
  <div class="save-indicator" id="saveIndicator">Saved</div>

  <div class="brand">
    <div class="brand-name">BUD</div>
    <div class="brand-divider"></div>
    <div class="budget-line" id="budgetLineView">
      <span>BUDGET: <span id="budgetDisplay">₱0.00</span></span>
      <button id="editBudgetBtn" aria-label="Edit budget" title="Edit budget">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>
      </button>
    </div>
    <div class="remaining-amt" id="remainingAmt">₱0.00</div>
    <div class="remaining-label">Remaining Budget</div>
    <div class="savings-line" id="savingsLine">
      <span class="savings-label">Savings:</span>
      <span id="savingsAmt">₱0.00</span>
    </div>
    <div class="wallet-line" id="walletLine">
      <span class="wallet-item"><span class="savings-label">Cash:</span><span id="cashAmt" class="wallet-amt">₱0.00</span></span>
      <span class="wallet-item"><span class="savings-label">E-Wallet:</span><span id="ewalletAmt" class="wallet-amt">₱0.00</span></span>
    </div>
  </div>

  <div class="calendar-card">
    <div class="cal-header">
      <button class="cal-nav-btn" id="prevMonth" aria-label="Previous month">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <button class="cal-month" id="calMonthLabel" aria-haspopup="true" aria-expanded="false">Month Year<span id="calMonthSpend"></span></button>
      <button class="cal-nav-btn" id="nextMonth" aria-label="Next month">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
      </button>
    </div>
    <div class="month-dropdown" id="monthDropdown" style="display:none;">
      <select class="month-select" id="monthSelect" aria-label="Select month"></select>
      <select class="month-select" id="yearSelect" aria-label="Select year"></select>
    </div>
    <div class="weekday-row">
      <div>S</div><div>M</div><div>T</div><div>W</div><div>T</div><div>F</div><div>S</div>
    </div>
    <div class="day-grid" id="dayGrid"></div>
  </div>

  <div class="log-section">
    <div class="log-title" id="logTitle">Log</div>
    <div class="log-divider"></div>
    <div class="log-list" id="logList"></div>
  </div>
</div>

<div class="overlay" id="overlay" style="display:none;">
  <div class="modal-card" id="modalCard">
    <div class="modal-head">
      <div>
        <div class="modal-date" id="modalDate">Date</div>
        <div class="modal-day-total" id="modalDayTotal">₱0.00 logged</div>
      </div>
      <button class="modal-close" id="closeModal" aria-label="Close">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal-divider"></div>

    <div class="modal-entries" id="modalEntries"></div>

    <div class="modal-section-label">Add Entry</div>
    <div class="type-toggle">
      <button class="type-btn exp active" id="typeExpBtn">− Expense</button>
      <button class="type-btn inc" id="typeIncBtn">+ Income</button>
      <button class="type-btn sav" id="typeSavBtn">◆ Savings</button>
    </div>

    <div class="modal-section-label">Wallet</div>
    <div class="wallet-toggle">
      <button class="wallet-btn cash active" id="walletCashBtn">Cash</button>
      <button class="wallet-btn ewallet" id="walletEwalletBtn">E-Wallet</button>
    </div>

    <label class="field-label">Amount</label>
    <input class="field-input" id="amountInput" placeholder="0.00" inputmode="decimal">

    <label class="field-label">Type / Description</label>
    <input class="field-input" id="descInput" placeholder="e.g. Groceries, Allowance">

    <button class="add-btn" id="addEntryBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
      Add Entry
    </button>
  </div>
</div>

<div class="overlay" id="entryOverlay" style="display:none;">
  <div class="modal-card entry-modal-card" id="entryModalCard">
    <div class="modal-head">
      <div>
        <div class="modal-date" id="entryModalDate">Date</div>
      </div>
      <button class="modal-close" id="closeEntryModal" aria-label="Close">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal-divider"></div>

    <div class="entry-detail-top">
      <div class="entry-detail-icon" id="entryModalIcon"></div>
      <div>
        <div class="entry-detail-type" id="entryModalTypeLabel">Expense</div>
        <div class="entry-detail-wallet" id="entryModalWallet">Cash</div>
        <div class="entry-detail-amount" id="entryModalAmount">₱0.00</div>
      </div>
    </div>

    <div class="modal-section-label">Description</div>
    <div class="entry-detail-desc" id="entryModalDesc">—</div>
  </div>
</div>

<script src="script.js?v=7"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(err => console.error('SW registration failed', err));
    });
  }
</script>
</body>
</html>
